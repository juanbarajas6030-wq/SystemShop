<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cuenta Creada</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .mensaje {
            text-align: center;
            margin-top: 100px;
            font-size: 24px;
            color: #ffffff;
            animation: aparecer 1s ease-in-out;
        }

        .check {
            font-size: 60px;
            color: #00fff7;
            animation: crecer 0.6s ease-in-out;
        }

        p {
            font-family: 'Poppins';
            text-transform: uppercase;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes crecer {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
    <script>
        setTimeout(() => {
            window.location.href = "{{ url_for('logIn') }}";
        }, 2000); // Redirige después de 2 segundos
    </script>
</head>

<body class="body1">
    <div class="mensaje contenedor">
        <div class="check">✔</div>
        <p>¡Tu cuenta ha sido creada con éxito!</p>
        <p>Redirigiendo al login</p>
    </div>
</body>

</html>
